<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FluentRead</title>
    <link
      href="https://fonts.loli.net/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body
    class="w-[360px] font-['DM_Sans',-apple-system,BlinkMacSystemFont,sans-serif] text-sm text-[var(--text-1)] bg-[var(--bg)] antialiased"
  >
    <div class="glass-card bg-[var(--card)] backdrop-blur-[24px] backdrop-saturate-[1.4]">
      <!-- Header -->
      <header class="flex items-center justify-between px-5 pt-[18px] pb-3.5">
        <div class="flex items-center gap-[11px]">
          <div
            class="logo-ring relative w-9 h-9 rounded-[10px] bg-gradient-to-br from-[#5b9fe6] to-[#3d78c4] flex items-center justify-center shadow-[var(--shadow-glow),var(--inset-light)] overflow-hidden"
          >
            <span class="relative z-10 text-white text-[13.5px] font-bold tracking-[-0.3px]"
              >FR</span
            >
          </div>
          <div>
            <span
              class="block text-[17px] font-bold tracking-[-0.4px] leading-[1.2] text-[var(--text-1)]"
              >FluentRead</span
            >
            <span class="block text-[11px] font-normal text-[var(--text-3)] tracking-[0.1px]"
              >沉浸式翻译</span
            >
          </div>
        </div>
        <div class="w-[9px] h-[9px]" id="status-dot" title="已就绪">
          <span
            class="status-pulse block w-[9px] h-[9px] rounded-full bg-emerald-400 shadow-[0_0_0_3px_rgba(52,211,153,0.15)] animate-[breathe_3s_ease-in-out_infinite]"
          ></span>
        </div>
      </header>

      <!-- First-use tip -->
      <div
        id="first-use-tip"
        class="tip-banner flex items-start gap-2.5 mx-3.5 mb-2.5 px-3.5 py-2.5 bg-[var(--accent-soft)] border border-[rgba(var(--accent-rgb),0.1)] rounded-[10px]"
        hidden
      >
        <div class="shrink-0 text-[var(--accent)] mt-px">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5" />
            <path
              d="M8 5v3.5M8 10.5v.5"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
            />
          </svg>
        </div>
        <p class="flex-1 text-xs leading-relaxed text-[var(--text-2)]">
          打开任意英文网页，开启翻译即可体验双语阅读。
        </p>
        <button
          id="dismiss-tip"
          class="shrink-0 bg-transparent border-none text-[var(--text-3)] cursor-pointer p-0.5 rounded-[6px] transition-colors duration-[180ms] ease-out hover:text-[var(--text-1)] hover:bg-black/[0.04]"
          aria-label="关闭提示"
        >
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path
              d="M2.5 2.5l7 7M9.5 2.5l-7 7"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
            />
          </svg>
        </button>
      </div>

      <!-- Mode selector -->
      <div class="px-3.5 pt-0.5 pb-3">
        <div
          class="relative flex bg-[var(--panel)] border border-[var(--panel-border)] rounded-[10px] p-[3px] gap-0.5 shadow-[var(--inset-light),var(--shadow-soft)]"
        >
          <div
            class="mode-indicator absolute top-[3px] left-[3px] w-[calc(33.333%-2.66px)] h-[calc(100%-6px)] bg-[var(--accent)] rounded-lg shadow-[var(--shadow-glow)] transition-transform duration-[380ms] z-0"
            style="transition-timing-function: var(--spring)"
            id="mode-indicator"
          ></div>
          <button
            class="mode-tab flex-1 relative z-10 flex items-center justify-center gap-[5px] py-[9px] px-1.5 bg-transparent border-none font-inherit text-[12.5px] font-medium text-[var(--text-2)] cursor-pointer rounded-lg transition-colors duration-200 whitespace-nowrap active"
            data-mode="bilingual"
            data-index="0"
          >
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <rect
                x="1"
                y="1"
                width="5"
                height="12"
                rx="1.5"
                stroke="currentColor"
                stroke-width="1.2"
              />
              <rect
                x="8"
                y="1"
                width="5"
                height="12"
                rx="1.5"
                stroke="currentColor"
                stroke-width="1.2"
              />
            </svg>
            <span>双语</span>
          </button>
          <button
            class="mode-tab flex-1 relative z-10 flex items-center justify-center gap-[5px] py-[9px] px-1.5 bg-transparent border-none font-inherit text-[12.5px] font-medium text-[var(--text-2)] cursor-pointer rounded-lg transition-colors duration-200 whitespace-nowrap"
            data-mode="target-only"
            data-index="1"
          >
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <rect
                x="1"
                y="1"
                width="12"
                height="12"
                rx="1.5"
                stroke="currentColor"
                stroke-width="1.2"
              />
              <path
                d="M4 5h6M4 7.5h4M4 10h5"
                stroke="currentColor"
                stroke-width="1.2"
                stroke-linecap="round"
              />
            </svg>
            <span>译文</span>
          </button>
          <button
            class="mode-tab flex-1 relative z-10 flex items-center justify-center gap-[5px] py-[9px] px-1.5 bg-transparent border-none font-inherit text-[12.5px] font-medium text-[var(--text-2)] cursor-pointer rounded-lg transition-colors duration-200 whitespace-nowrap"
            data-mode="selection"
            data-index="2"
          >
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path
                d="M3 4c0-.6.4-1 1-1h6c.6 0 1 .4 1 1v1H3V4z"
                stroke="currentColor"
                stroke-width="1.2"
              />
              <path
                d="M5 8l2 3 2-3"
                stroke="currentColor"
                stroke-width="1.2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            <span>划词</span>
          </button>
        </div>
      </div>

      <!-- Controls -->
      <div class="px-3.5 pt-0.5 pb-1">
        <div
          class="flex items-center justify-between p-[13px_12px] mb-1.5 bg-[var(--panel)] border border-[var(--panel-border)] rounded-[10px] shadow-[var(--inset-light)] transition-colors duration-[180ms] hover:border-[rgba(var(--accent-rgb),0.12)]"
        >
          <div class="flex flex-col gap-0.5">
            <span class="text-[13.5px] font-semibold text-[var(--text-1)]">翻译当前页面</span>
            <span class="text-[11px] font-normal text-[var(--text-3)]">Alt + T</span>
          </div>
          <label class="toggle relative cursor-pointer">
            <input type="checkbox" id="toggle-translate" />
            <span
              class="toggle-track block w-[44px] h-[25px] bg-[var(--panel)] border-[1.5px] border-[var(--panel-border)] rounded-full transition-all duration-200"
            >
              <span
                class="toggle-knob block w-[19px] h-[19px] m-[1.5px] bg-white rounded-full shadow-[0_1px_3px_rgba(0,0,0,0.1),0_1px_1px_rgba(0,0,0,0.06)] transition-transform duration-[280ms]"
                style="transition-timing-function: var(--spring)"
              ></span>
            </span>
          </label>
        </div>
        <div
          class="flex items-center justify-between p-[13px_12px] bg-[var(--panel)] border border-[var(--panel-border)] rounded-[10px] shadow-[var(--inset-light)] transition-colors duration-[180ms] hover:border-[rgba(var(--accent-rgb),0.12)]"
        >
          <div class="flex flex-col gap-0.5">
            <span class="text-[13.5px] font-semibold text-[var(--text-1)]">自动翻译此站点</span>
            <span class="text-[11px] font-normal text-[var(--text-3)]">记住偏好</span>
          </div>
          <label class="toggle relative cursor-pointer">
            <input type="checkbox" id="toggle-auto" />
            <span
              class="toggle-track block w-[44px] h-[25px] bg-[var(--panel)] border-[1.5px] border-[var(--panel-border)] rounded-full transition-all duration-200"
            >
              <span
                class="toggle-knob block w-[19px] h-[19px] m-[1.5px] bg-white rounded-full shadow-[0_1px_3px_rgba(0,0,0,0.1),0_1px_1px_rgba(0,0,0,0.06)] transition-transform duration-[280ms]"
                style="transition-timing-function: var(--spring)"
              ></span>
            </span>
          </label>
        </div>
      </div>

      <!-- Language -->
      <div
        class="flex items-center justify-between px-5 py-3 mt-1.5 border-t border-[var(--divider)]"
      >
        <div class="flex items-center gap-2 text-[13px] font-medium text-[var(--text-2)]">
          <svg class="text-[var(--text-3)]" width="14" height="14" viewBox="0 0 14 14" fill="none">
            <circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.2" />
            <ellipse cx="7" cy="7" rx="3" ry="6" stroke="currentColor" stroke-width="1.2" />
            <path d="M1.5 5.5h11M1.5 8.5h11" stroke="currentColor" stroke-width="1.2" />
          </svg>
          <span>目标语言</span>
        </div>
        <div class="relative">
          <select
            id="target-lang"
            class="appearance-none py-[7px] pl-3 pr-[30px] font-inherit text-[13px] font-medium text-[var(--text-1)] bg-[var(--panel)] border border-[var(--panel-border)] rounded-lg cursor-pointer outline-none shadow-[var(--inset-light)] transition-all duration-[180ms] hover:border-[rgba(var(--accent-rgb),0.2)] focus:border-[var(--accent)] focus:shadow-[0_0_0_3px_var(--accent-soft)]"
          >
            <option value="zh-CN" selected>简体中文</option>
            <option value="zh-TW">繁體中文</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
            <option value="en">English</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="es">Español</option>
          </select>
          <svg
            class="absolute right-2.5 top-1/2 -translate-y-1/2 pointer-events-none text-[var(--text-3)]"
            width="10"
            height="10"
            viewBox="0 0 10 10"
            fill="none"
          >
            <path
              d="M2.5 4L5 6.5 7.5 4"
              stroke="currentColor"
              stroke-width="1.3"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
      </div>

      <!-- Footer -->
      <footer
        class="flex items-center justify-between px-5 pt-2.5 pb-4 border-t border-[var(--divider)]"
      >
        <span class="text-[11px] font-normal text-[var(--text-3)] tracking-[0.3px]">v1.0.0</span>
        <a
          href="#"
          id="open-options"
          class="inline-flex items-center gap-[5px] text-[12.5px] font-medium text-[var(--text-2)] no-underline py-[5px] px-3 rounded-lg bg-[var(--panel)] border border-[var(--panel-border)] shadow-[var(--inset-light)] transition-all duration-[180ms] hover:text-[var(--accent)] hover:border-[rgba(var(--accent-rgb),0.2)] hover:shadow-[var(--shadow-glow)] [&>svg]:text-[var(--text-3)] [&>svg]:transition-colors [&>svg]:duration-[180ms] hover:[&>svg]:text-[var(--accent)]"
        >
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
            <circle cx="6.5" cy="6.5" r="2" stroke="currentColor" stroke-width="1.2" />
            <path
              d="M6.5 1v1.5M6.5 10.5V12M1 6.5h1.5M10.5 6.5H12M2.7 2.7l1.06 1.06M9.24 9.24l1.06 1.06M2.7 10.3l1.06-1.06M9.24 3.76l1.06-1.06"
              stroke="currentColor"
              stroke-width="1.2"
              stroke-linecap="round"
            />
          </svg>
          <span>设置</span>
        </a>
      </footer>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
