<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FluentRead</title>
    <link
      href="https://fonts.loli.net/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body
    class="w-[360px] font-['Inter',-apple-system,BlinkMacSystemFont,sans-serif] text-sm text-[var(--text-1)] bg-[var(--bg)] antialiased"
  >
    <div
      class="popup-card bg-[var(--card)] border border-[var(--card-border)] shadow-[var(--card-shadow)]"
    >
      <!-- Language Row -->
      <div class="flex items-center justify-center gap-3 p-4">
        <div
          class="lang-pill flex-1 flex flex-col items-center gap-0.5 py-2.5 px-4 bg-[var(--panel)] border border-[var(--panel-border)] rounded-[10px] cursor-default"
        >
          <span class="text-sm font-medium text-[var(--text-1)]">原文</span>
          <span class="text-[11px] text-[var(--text-3)]">自动检测</span>
        </div>

        <svg
          class="shrink-0 text-[var(--arrow)]"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M5 12h14" />
          <path d="m12 5 7 7-7 7" />
        </svg>

        <div
          class="lang-pill flex-1 flex flex-col items-center gap-0.5 py-2.5 px-4 bg-[var(--panel)] border border-[var(--panel-border)] rounded-[10px] cursor-pointer relative"
        >
          <span class="text-sm font-medium text-[var(--text-1)]" id="target-lang-text"
            >简体中文</span
          >
          <span class="text-[11px] text-[var(--text-3)]">目标语言</span>
          <select id="target-lang" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
            <option value="zh-CN" selected>简体中文</option>
            <option value="zh-TW">繁體中文</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
            <option value="en">English</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="es">Español</option>
          </select>
        </div>
      </div>

      <!-- Divider -->
      <div class="h-px mx-4 bg-[var(--divider)]"></div>

      <!-- Action Row -->
      <div class="flex items-center gap-2.5 px-4 py-2.5">
        <button
          id="mode-toggle"
          class="mode-btn relative flex items-center justify-center gap-px w-10 h-10 bg-[var(--panel)] border border-[var(--panel-border)] rounded-[10px] cursor-pointer"
        >
          <span class="label-en text-[13px] font-bold text-[var(--accent)]">A</span>
          <span class="label-sep text-[11px] text-[var(--arrow)]">/</span>
          <span class="label-zh text-[12px] font-medium text-[var(--text-1)]">文</span>
        </button>
        <button
          id="translate-btn"
          class="translate-btn flex-1 py-3 px-6 rounded-xl text-[15px] font-semibold text-white cursor-pointer border-none"
          style="background: var(--btn-gradient); box-shadow: var(--btn-glow)"
        >
          翻译
        </button>
      </div>

      <!-- Toggle Section -->
      <div class="px-4 pt-1 pb-4 flex flex-col gap-0.5">
        <!-- Toggle 1: 总是翻译该网站 -->
        <div class="toggle-row flex items-center justify-between py-2.5 px-0">
          <span class="text-[13px] text-[var(--text-2)]">总是翻译该网站</span>
          <label class="toggle relative cursor-pointer">
            <input type="checkbox" id="toggle-auto" />
            <span
              class="toggle-track block w-10 h-[22px] bg-[var(--toggle-bg)] border border-[var(--toggle-border)] rounded-full transition-all duration-200"
            >
              <span
                class="toggle-knob block w-4 h-4 mt-[2px] ml-[2px] bg-[var(--toggle-knob)] rounded-full transition-transform duration-[280ms]"
                style="transition-timing-function: var(--spring)"
              ></span>
            </span>
          </label>
        </div>

        <!-- Toggle 2: 划词翻译 -->
        <div class="toggle-row flex items-center justify-between py-2.5 px-0">
          <span class="text-[13px] text-[var(--text-2)]">划词翻译</span>
          <label class="toggle relative cursor-pointer">
            <input type="checkbox" id="toggle-selection" />
            <span
              class="toggle-track block w-10 h-[22px] bg-[var(--toggle-bg)] border border-[var(--toggle-border)] rounded-full transition-all duration-200"
            >
              <span
                class="toggle-knob block w-4 h-4 mt-[2px] ml-[2px] bg-[var(--toggle-knob)] rounded-full transition-transform duration-[280ms]"
                style="transition-timing-function: var(--spring)"
              ></span>
            </span>
          </label>
        </div>
      </div>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
