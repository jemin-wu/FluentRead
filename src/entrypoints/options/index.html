<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="manifest.open_in_tab" content="true" />
    <title>FluentRead — 高级设置</title>
    <link
      href="https://fonts.loli.net/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body
    class="font-['DM_Sans',sans-serif] text-[15px] text-[var(--text-primary)] bg-[var(--bg)] leading-normal"
  >
    <div class="max-w-[600px] mx-auto py-8 px-4">
      <!-- Header -->
      <header class="flex items-center gap-3 mb-6">
        <div
          class="w-9 h-9 bg-[var(--accent)] text-white rounded-lg flex items-center justify-center text-[15px] font-bold shrink-0"
        >
          FR
        </div>
        <h1 class="text-2xl font-semibold text-[var(--text-primary)]">FluentRead 设置</h1>
      </header>

      <!-- Translation settings -->
      <section class="bg-[var(--surface)] border border-[var(--border)] rounded-xl p-5 mb-4">
        <h2 class="text-base font-semibold text-[var(--text-primary)] mb-4">翻译设置</h2>
        <div class="setting-row flex items-center justify-between py-3">
          <span class="text-[15px] text-[var(--text-primary)]">翻译源</span>
          <span class="text-[13px] text-[var(--text-secondary)]">Google Translate</span>
        </div>
        <div class="setting-row flex items-center justify-between py-3">
          <label class="text-[15px] text-[var(--text-primary)]" for="default-lang"
            >默认目标语言</label
          >
          <select
            id="default-lang"
            class="py-1.5 px-3 border border-[var(--border)] rounded-lg bg-[var(--bg)] text-[var(--text-primary)] font-['DM_Sans',sans-serif] text-[13px] cursor-pointer outline-none focus:border-[var(--accent)]"
          >
            <option value="zh-CN" selected>简体中文</option>
            <option value="zh-TW">繁體中文</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
            <option value="en">English</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="es">Español</option>
          </select>
        </div>
      </section>

      <!-- Display settings -->
      <section class="bg-[var(--surface)] border border-[var(--border)] rounded-xl p-5 mb-4">
        <h2 class="text-base font-semibold text-[var(--text-primary)] mb-4">显示设置</h2>
        <p class="text-[13px] text-[var(--text-muted)]">更多显示选项将在后续版本中提供。</p>
      </section>

      <!-- Site management -->
      <section class="bg-[var(--surface)] border border-[var(--border)] rounded-xl p-5 mb-4">
        <h2 class="text-base font-semibold text-[var(--text-primary)] mb-4">站点管理</h2>
        <p class="text-[13px] text-[var(--text-muted)] mb-3">自动翻译的网站列表</p>
        <div id="site-list" class="min-h-[40px]">
          <p class="text-[13px] text-[var(--text-muted)] text-center py-3">暂无已配置站点</p>
        </div>
      </section>

      <!-- Data management -->
      <section class="bg-[var(--surface)] border border-[var(--border)] rounded-xl p-5 mb-4">
        <h2 class="text-base font-semibold text-[var(--text-primary)] mb-4">数据管理</h2>
        <div class="flex items-center justify-between py-3">
          <span class="text-[15px] text-[var(--text-primary)]">缓存占用</span>
          <span
            id="cache-size"
            class="text-[13px] text-[var(--text-secondary)] font-['JetBrains_Mono',monospace]"
            >0 B / 8 MB</span
          >
        </div>
        <button
          id="clear-cache"
          class="mt-3 py-2 px-4 bg-transparent text-[var(--error)] border border-[var(--error)] rounded-lg font-['DM_Sans',sans-serif] text-[13px] font-medium cursor-pointer transition-colors duration-100 hover:bg-[rgba(234,67,53,0.1)]"
        >
          清空翻译缓存
        </button>
      </section>

      <!-- About -->
      <footer class="text-center pt-6 pb-2 text-[11px] text-[var(--text-muted)]">
        <span>FluentRead v1.0.0</span>
      </footer>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
