<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="manifest.open_in_tab" content="true" />
    <title>FluentRead — 高级设置</title>
    <link
      href="https://fonts.loli.net/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <header class="page-header">
        <div class="logo">FR</div>
        <h1>FluentRead 设置</h1>
      </header>

      <section class="card">
        <h2 class="section-title">翻译设置</h2>
        <div class="setting-row">
          <span class="setting-label">翻译源</span>
          <span class="setting-value">Google Translate</span>
        </div>
        <div class="setting-row">
          <label class="setting-label" for="default-lang">默认目标语言</label>
          <select id="default-lang" class="lang-select">
            <option value="zh-CN" selected>简体中文</option>
            <option value="zh-TW">繁體中文</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
            <option value="en">English</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="es">Español</option>
          </select>
        </div>
      </section>

      <section class="card">
        <h2 class="section-title">显示设置</h2>
        <p class="placeholder-text">更多显示选项将在后续版本中提供。</p>
      </section>

      <section class="card">
        <h2 class="section-title">站点管理</h2>
        <p class="section-desc">自动翻译的网站列表</p>
        <div id="site-list" class="site-list">
          <p class="empty-state">暂无已配置站点</p>
        </div>
      </section>

      <section class="card">
        <h2 class="section-title">数据管理</h2>
        <div class="setting-row">
          <span class="setting-label">缓存占用</span>
          <span id="cache-size" class="setting-value mono">0 B / 8 MB</span>
        </div>
        <button id="clear-cache" class="btn-danger">清空翻译缓存</button>
      </section>

      <footer class="about">
        <span>FluentRead v1.0.0</span>
      </footer>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
